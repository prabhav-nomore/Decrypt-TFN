<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Simple Web Page</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            text-align: center;
            margin: 0;
            padding: 0;
        }

        header {
            background-color: #333;
            color: white;
            padding: 15px;
        }

        img {
            width: 300px;
            height: auto;
            margin-top: 0px;
            border-radius: 10px;
        }

        a {
            display: inline-block;
            margin-top: 20px;
            padding: 5px 5px;
            background-color: #007BFF;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }

        a:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

    <header>
        <h1>Welcome Participants</h1>
    </header>

    <main>
        <p>This is a simple HTML page with an image and a link.</p>
<a href="page1.html">
        <img src="pic1.jpg" alt="Sample Image"></a>
        <br>
        <a href="page1.html">Go to Next Page</a>
    </main>

</body>
</html>
