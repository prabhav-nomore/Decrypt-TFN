<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Puzzle 5: The Login Vault</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Exo+2:wght@300;700&display=swap');
    * { box-sizing: border-box; }
    body { margin: 0; background: #000; color: #00ff88; font-family: 'Share Tech Mono', monospace; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .terminal { width: 520px; background: #0a0a0a; border: 1px solid #00ff88; border-radius: 6px; padding: 32px; box-shadow: 0 0 30px rgba(0,255,136,0.15); }
    .bar { display:flex; gap:8px; margin-bottom: 20px; }
    .dot { width:12px; height:12px; border-radius:50%; }
    .r{background:#ff5f57;}.y{background:#ffbd2e;}.g{background:#28c840;}
    h2 { font-family: 'Exo 2', sans-serif; font-size: 1.4rem; margin: 0 0 20px; letter-spacing: 0.1em; color: #00ff88; }
    label { display: block; font-size: 0.85rem; margin-bottom: 6px; color: #00bb66; }
    input[type="text"], input[type="password"] {
      width: 100%; padding: 10px; background: #000; border: 1px solid #00aa55;
      color: #00ff88; font-family: 'Share Tech Mono', monospace; font-size: 0.95rem;
      border-radius: 3px; margin-bottom: 16px;
    }
    button { width: 100%; padding: 12px; background: #00ff88; color: #000; font-weight: 700; border: none; border-radius: 3px; cursor: pointer; font-family: 'Share Tech Mono', monospace; font-size: 1rem; letter-spacing: 0.1em; }
    .hint { font-size: 0.8rem; color: #006633; margin-top: 16px; }
    /* A hidden field stores the master override token */
  </style>
</head>
<body>
  <div class="terminal">
    <div class="bar"><div class="dot r"></div><div class="dot y"></div><div class="dot g"></div></div>
    <h2>// SECURE_VAULT v2.1</h2>
    <label>USERNAME:</label>
    <input type="text" placeholder="Enter username" value="">
    <label>PASSWORD:</label>
    <input type="password" placeholder="••••••••••" value="">

    <!-- The bypass token is stored in a hidden input field -->
    <input type="hidden" name="override_token" value="NIGHTWATCH" id="bypass">
    <input type="hidden" name="session_id" value="NX-4491-ZZ">

    <button onclick="alert('Access denied. Try harder.')">LOGIN</button>
    <p class="hint">> Authorised access only. Violators will be prosecuted.</p>
    <p class="hint">> HINT: Some inputs are hidden from view but not from inspection.</p>
  </div>
</body>
</html>
