<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Clue Challenge</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #2b0000, #660000);
      color: #fff;
    }

    .card {
      width: 520px;
      padding: 30px;
      border-radius: 12px;
      background: rgba(0,0,0,0.6);
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    .line {
      margin: 10px 0;
      font-size: 18px;
    }

    .hidden {
      display: none;
    }
  </style>
</head>

<body>

  <div class="card">
    <h1>🧠 Clue Challenge</h1>

    <p class="line">The answer is not written anywhere.</p>
    <p class="line">But every clue points to the same thing.</p>

    <!-- Clue 1 -->
    <!-- It gives warmth but can also destroy -->

    <!-- Clue 2 -->
    <div class="hidden">It needs fuel to stay alive</div>

    <!-- Clue 3 -->
    <p class="hidden">It dances and never stays still</p>

    <!-- Clue 4 -->
    <p class="line">Without it, cooking would be impossible</p>

    <!-- Misleading -->
    <!-- HIDDENKEY: HEAT -->

    <!-- Hint -->
    <!-- Think of the source, not the effect -->

  </div>

</body>
</html>
