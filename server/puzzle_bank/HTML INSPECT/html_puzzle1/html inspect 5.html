<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Hidden Attribute Puzzle</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    }

    .card {
      width: 400px;
      background: white;
      padding: 25px;
      border-radius: 15px;
      text-align: center;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    h1 {
      margin-bottom: 10px;
    }

    .hint {
      color: #555;
      margin-top: 15px;
    }

    .hidden {
      display: none;
    }
  </style>
</head>

<body>

  <div class="card">
    <h1>🔍 Hidden Puzzle</h1>

    <p class="hint">Not everything is in plain sight.</p>
    <p class="hint">Sometimes information is stored quietly.</p>

    <!-- Fake clue -->
    <!-- HIDDENKEY: CLOUD -->

    <!-- Hint -->
    <!-- Try checking attributes of elements -->

    <button title="HIDDENKEY: OCEAN">Click Me</button>

    <div class="hidden">Nothing useful here</div>
  </div>

</body>
</html>
